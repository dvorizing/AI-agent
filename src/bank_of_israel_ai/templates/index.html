<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Procurement Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Procurement Agent</h1>
            <p>חפש מוצר באינטרנט ושלח את 3 התוצאות הראשונות למייל</p>
        </header>

        <div class="chat-box">
            <div id="messages" class="messages">
                <div class="message bot">
                    <p>שלום! 👋 אני סוכן הרכש החכם.</p>
                    <p>הקלד <strong>שם מוצר</strong> ו<strong>כתובת מייל</strong> ואני אחפש באינטרנט ואשלח לך את 3 התוצאות הראשונות.</p>
                    <p><strong>דוגמה:</strong></p>
                    <p><em>מחשב נייד Dell ושלח ל-user@example.com</em></p>
                </div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="userInput"
                    placeholder="הקלד שם מוצר + מייל …"
                    autocomplete="off"
                >
                <button id="sendBtn" onclick="sendMessage()">שלח 📤</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <p>⏳ הסוכן עובד … חיפוש באינטרנט ושליחת מייל</p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
